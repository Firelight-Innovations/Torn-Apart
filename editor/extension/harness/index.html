<!DOCTYPE html>
<!--
  Fire Editor browser viewport harness (EDITOR_PRD agent access).

  Served by `python tools/editor_client.py serve` over HTTP. Open it (or point
  the Chrome MCP tools) at:

      http://127.0.0.1:8770/harness/?port=8123&seed=1337&cam=20,-20,24

  harnessBoot.js loads FIRST: it injects the viewport markup, installs the
  window host shim, and opens the daemon WebSocket. sceneView.js then runs the
  exact same three.js viewport bundle the VS Code panel uses — so screenshots
  here match the editor pixel-for-pixel. Drive it from the JS console via
  `window.fireHarness` or read `window.__fireSceneDebug.snapshot()`.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fire Editor — Viewport Harness</title>
</head>
<body>
  <script src="../media/harnessBoot.js"></script>
  <script src="../media/sceneView.js"></script>
</body>
</html>
