# Torn Apart — runtime configuration.
# Values here override the defaults in core/config.py (Config frozen dataclass).
# Units: meters, seconds, voxels. See docs/systems/core.md.

world_seed = 1337          # RNG seed for procedural systems (textures, noise, NPC) — NOT terrain
world_size_m = 1000.0      # square world footprint side (meters), centred on origin → 1 km × 1 km area
ground_height_m = 8.0      # flat baseline ground surface height (world Z, meters)
voxel_size = 0.5            # meters per voxel edge
chunk_size = 32            # voxels per chunk edge (16 m cube)
light_grid_scale = 2       # terrain voxels per light cell edge (1 m cells)
view_distance_chunks = 6   # XY streaming radius in chunks
fixed_dt = 0.02            # fixed-update timestep (50 Hz)
msaa_samples = 4           # geometry-edge MSAA (0 = off); texel interiors stay crisp single-sample

[debug]
show_fps = true
show_chunk_borders = false
show_light_grid = false
debug_wind_ball = true     # dev wind-field physics proof: a bright ball on the ground near spawn that gusts scoot / storms roll (set false to hide)

[terrain]
mesh_style = "faceted"         # "faceted" = flat-shaded surface nets (semi-smooth Daggerfall look); "blocky" = classic cubes
facet_shade_strength = 0.25    # [0,1] normal-based facet accent shading baked into vertex colors (0 = off)
ground_texels_per_m = 16.0    # virtual texels/m for the GPU shader's non-repeating world-space ground pattern (~0.0625 m pixels); LOD octaves fade with distance

[lighting]
lighting_backend = "gpu"       # "gpu" = volumetric radiance cascades (GLSL compute); "cpu" = legacy baked vertex sunlight
light_c0_cells = 96            # cascade-0 texels per axis (96 x 0.5 m = 48 m box around the camera)
light_c0_cell_m = 0.5          # cascade-0 cell edge (meters) — one terrain voxel
light_c1_cells = 96            # cascade-1 texels per axis (96 x 2.0 m = 192 m box, covers view distance)
light_c1_cell_m = 2.0          # cascade-1 cell edge (meters)
light_c2_cells = 64            # cascade-2 texels per axis (64 x 8.0 m = 512 m box) — coarse FAR cascade
light_c2_cell_m = 8.0          # cascade-2 cell edge (meters); keeps distant terrain lit (low-res shadows + GI)
light_quant_m = 0.0625         # shading sample quantisation (meters) → 8x8x8 light pixels per voxel
light_prop_iters = 2           # GI flood-fill iterations per frame per cascade
light_bounce_strength = 0.7    # [0,1] albedo-tinted bounce gain
light_ao_strength = 0.6        # [0,1] voxel ambient-occlusion strength
light_max_point_lights = 64    # max point/area lights uploaded per frame
light_exposure = 0.9           # HDR tonemap exposure (base; auto-exposure multiplies it)
exposure_adapt_enabled = true  # auto-exposure / eye adaptation
exposure_min = 0.55            # brightest-scene multiplier clamp (midday stop-down)
exposure_max = 5.0             # darkest-scene multiplier clamp (caves, moonless night)
exposure_key = 0.18            # metering key (0.18 = photographic middle gray)
exposure_tau_dark_s = 4.0      # seconds to adapt INTO darkness (slow, like eyes)
exposure_tau_bright_s = 0.7    # seconds to adapt into bright light (fast)

[fog]
fog_enabled = true             # volumetric froxel fog + god rays
fog_froxels_x = 160            # froxel grid width (screen-aligned)
fog_froxels_y = 90             # froxel grid height
fog_froxels_z = 64             # exponential depth slices
fog_far_m = 192.0              # froxel volume far range (meters) — covers the cascade-1 192 m box so fog never cuts off mid-cascade
fog_anisotropy = 0.55          # Henyey-Greenstein g (forward-scatter strength of god rays)

[grass]
grass_density_per_m2 = 12.0    # default blade tufts per square meter (volumes can override via params.density)
grass_blade_height_m = 0.6     # unscaled tuft height (meters); per-blade jitter scales 0.7-1.3x
grass_fade_start_m = 60.0      # camera distance where blades start shrinking away
grass_fade_end_m = 90.0        # camera distance where blades are fully gone
grass_max_instances = 200000   # hard cap on instances per grass volume

[wind]
# Spatially-varying wind field (fire_engine/wind/): a 64x64-cell x 4 m (256 m)
# player-centred grid of horizontal wind velocity built from seeded spectral
# gust modes that advect downwind, plus an analytic vertical profile.
# Units: meters, m/s, rad/s, seconds.
wind_time_scale = 1.0          # wind-clock seconds per REAL second - gust travel is
                               # an aesthetic real-time effect, independent of the
                               # game timescale (60x today, 30x later); raise for
                               # faster-evolving wind, lower for lazier
wind_cells = 64                # grid cells per axis (64 x 4 m = 256 m region)
wind_cell_m = 4.0              # cell edge (meters)
wind_snap_cells = 8            # recenter origin snap granularity (cells -> 32 m)
wind_margin_cells = 8          # recenter hysteresis band (cells from centre -> 32 m)
wind_gust_modes = 12           # spectral Brownian-band gust modes summed per cell
wind_gust_wavelen_min = 20.0   # gust spatial wavelength band min (meters)
wind_gust_wavelen_max = 120.0  # gust spatial wavelength band max (meters)
wind_gust_omega_min = 0.15     # intrinsic temporal frequency band min (rad/s)
wind_gust_omega_max = 0.8      # intrinsic temporal frequency band max (rad/s)
wind_gust_base = 0.6           # base gust amplitude gain (calm air)
wind_gust_storm_gain = 1.4     # extra gust amplitude per unit storminess
wind_storm_freq_gain = 0.8     # temporal-frequency boost per unit storminess (choppier)
wind_speed_ref = 8.0           # reference mean wind speed for full gust gain (m/s)
wind_turb_base = 0.2           # base turbulence channel value (calm)
wind_turb_storm_gain = 1.0     # turbulence increase per unit storminess
wind_shear = 0.18              # vertical-profile power-law shear exponent
wind_profile_z_ref = 10.0      # reference height where profile reaches 1.0 (meters)
wind_profile_floor = 0.35      # minimum profile multiplier at ground level
wind_profile_cap = 1.6         # maximum profile multiplier high up
wind_layer_m = 8.0             # venturi terrain-occupancy fold band above ground (m; WP2)
wind_venturi_iters = 8         # venturi flux-relaxation iterations (WP2)
wind_venturi_max = 2.2         # clamp on venturi speed-up multiplier (WP2)
wind_deflect_gain = 0.15       # venturi sideways-deflection gain (WP2)
wind_updraft_gain = 0.4        # analytic obstacle-updraft gain (WP2)
wind_mote_count = 1500         # dust/pollen mote instance count (WP4)
wind_mote_box_m = 24.0         # camera-anchored mote lattice cell size (meters; WP4)
wind_mote_size_m = 0.04        # mote billboard size (meters; WP4)
wind_mote_life_s = 6.0         # mote looping lifetime (seconds; WP4)
wind_leaf_density_per_m2 = 0.15  # leaf-litter instances per m2 of a "trees" volume (WP4)
wind_leaf_size_m = 0.12        # leaf billboard size (meters; WP4)
wind_leaf_max_instances = 20000  # hard cap on leaf instances per volume (WP4)

[sky]
sky_cloud_altitude_m = 96.0    # cloud layer base altitude (world Z, meters)
sky_cloud_thickness_m = 8.0    # cloud layer vertical thickness (meters)
sky_cloud_cell_m = 12.0        # horizontal size of one cloud cell (meters)
sky_star_count = 9000          # stars baked into the night-sky cubemap (smaller + denser field)

[graphics]
# HDR post-processing + volumetric clouds quality. Pick a preset, then
# uncomment any gfx_* line below to override that preset's value.
# Presets: "off" (no post-fx, fastest) | "low" (iGPU) | "medium" | "high".
preset = "high"
# gfx_post_process = true        # master switch for the HDR buffer + post chain
# gfx_hdr_format = "rgba16f"     # "rgba16f" float HDR, or "rgba8" fallback
# gfx_render_scale = 1.0         # internal render resolution scale (1.0 = full)
# gfx_bloom = true               # bloom (the sun's glow/bleed)
# gfx_bloom_mips = 5             # bloom pyramid depth (wider, softer glow)
# gfx_bloom_threshold = 1.0      # HDR luminance above which pixels bloom
# gfx_bloom_knee = 0.5           # soft-knee width below the threshold
# gfx_bloom_strength = 0.06      # bloom added back at composite
# gfx_fxaa = true                # cheap post anti-aliasing
# gfx_lens_flare = true          # lens flare near the unoccluded sun
# gfx_clouds = true              # volumetric raymarched clouds
# gfx_cloud_steps = 96           # primary raymarch samples (quality)
# gfx_cloud_light_steps = 8      # sun light-march steps (self-shadow; main cost)
# gfx_cloud_resolution_scale = 1.0  # 0.5 = half-res clouds (big iGPU win)
# gfx_cloud_max_dist_m = 6000.0  # far raymarch distance for clouds (meters)
# gfx_god_rays = true            # crepuscular rays through clouds
# gfx_god_ray_samples = 32       # radial god-ray samples
#
# --- Aesthetic tuning (NOT changed by the preset — tune these freely) --------
# These control the LOOK of the sun/sky/flare, independent of quality preset.
# Uncomment and edit to taste; the values shown are the defaults.
# gfx_god_ray_strength = 0.4       # how strongly god rays add in (0 = none)
# gfx_lens_flare_strength = 0.055  # lens-flare intensity (raise for stronger)
# gfx_lens_flare_threshold = 4.0   # HDR level the flare treats as "the sun"
#                                  # (higher = only the brightest core flares)
# gfx_tonemap_hue_preserve = 0.8   # 0 = bright sky washes to white (filmic);
#                                  # 1 = sky keeps its colour as it brightens
# gfx_sun_disc_intensity = 45.0    # how hard the sun disc blooms into a blob
# gfx_sun_halo_intensity = 1.8     # brightness of the glow haloing the sun
# gfx_sun_min_brightness = 0.25    # floor so a low sunrise/sunset sun stays
#                                  # bright instead of fading (hue preserved)
# gfx_sky_inscatter_scale = 0.9    # sky brightness multiplier; LOWER this if
#                                  # the world looks washed out at low sun
