[pytest]
# Default run excludes window/GPU tests AND the heavy coverage gate.
#   pytest -m window     → run Panda3D window tests
#   pytest -m coverage   → run the branch-coverage ratchet gate (CI/nightly)
addopts = -m "not window and not coverage"

markers =
    window: marks tests that require a Panda3D window or GPU (deselected by default)
    coverage: the branch-coverage ratchet gate; re-runs the suite under coverage (deselected by default — run in CI/nightly)
